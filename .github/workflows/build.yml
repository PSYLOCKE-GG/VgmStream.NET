name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  native:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: windows-latest, rid: win-x64,    lib: libvgmstream.dll }
          - { runner: ubuntu-22.04,   rid: linux-x64,  lib: libvgmstream.so }
          - { runner: macos-15,       rid: osx-arm64,  lib: libvgmstream.dylib }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Windows ──
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S vgmstream -B build -G "Visual Studio 17 2022" -A x64 `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON `
            -DBUILD_CLI=OFF -DBUILD_FB2K=OFF -DBUILD_WINAMP=OFF -DBUILD_XMPLAY=OFF `
            -DUSE_MPEG=OFF -DUSE_G719=OFF -DUSE_G7221=OFF -DUSE_CELT=OFF `
            -DUSE_ATRAC9=OFF -DUSE_SPEEX=OFF

          # Build ext_libs targets first (generates x86 import libs, marks
          # them as up-to-date in MSBuild's incremental tracking)
          cmake --build build --config Release --target libvorbis ffmpeg

          # Overwrite with x64 import libs — MSBuild won't re-run the
          # custom commands since the targets are already built
          lib /def:vgmstream/ext_libs/libvorbis.def /machine:x64 /out:build/ext_libs/libvorbis.lib
          lib /def:vgmstream/ext_libs/avcodec-vgmstream-59.def /machine:x64 /out:build/ext_libs/avcodec.lib
          lib /def:vgmstream/ext_libs/avformat-vgmstream-59.def /machine:x64 /out:build/ext_libs/avformat.lib
          lib /def:vgmstream/ext_libs/avutil-vgmstream-57.def /machine:x64 /out:build/ext_libs/avutil.lib
          lib /def:vgmstream/ext_libs/swresample-vgmstream-4.def /machine:x64 /out:build/ext_libs/swresample.lib

          cmake --build build --config Release --target libvgmstream_shared

      - name: Collect (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "runtimes/${{ matrix.rid }}/native"
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          Copy-Item build/src/Release/${{ matrix.lib }} $out

          @(
            "libvorbis.dll",
            "avcodec-vgmstream-59.dll",
            "avformat-vgmstream-59.dll",
            "avutil-vgmstream-57.dll",
            "swresample-vgmstream-4.dll"
          ) | ForEach-Object { Copy-Item "vgmstream/ext_libs/dll-x64/$_" $out }

      # ── Linux ──
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libvorbis-dev libogg-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswresample-dev

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S vgmstream -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_SKIP_INSTALL_RULES=ON \
            -DBUILD_CLI=OFF -DBUILD_V123=OFF -DBUILD_AUDACIOUS=OFF \
            -DUSE_MPEG=OFF -DUSE_G719=OFF -DUSE_G7221=OFF -DUSE_CELT=OFF \
            -DUSE_ATRAC9=OFF -DUSE_SPEEX=OFF
          cmake --build build --config Release --target libvgmstream_shared

      - name: Collect (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          out="runtimes/${{ matrix.rid }}/native"
          mkdir -p "$out"
          cp "build/src/${{ matrix.lib }}" "$out/"

          # Walk the transitive dep closure reachable from libvgmstream.so.
          # Ubuntu's libavcodec pulls in the same codec fanout homebrew does
          # (libx264/libx265/libvpx/libdav1d/libopus/libmp3lame/libSvtAv1Enc/
          # libssl/libcrypto + their own deps), and each has to sit alongside
          # libvgmstream.so for the consumer's ld.so to resolve @ORIGIN refs.
          #
          # IMPORTANT: patchelf --set-rpath without --force-rpath sets DT_RUNPATH,
          # which the loader does NOT search transitively (only the direct-NEEDED
          # lib). --force-rpath sets DT_RPATH, which IS transitive — required so
          # libavcodec.so's own @ORIGIN search resolves libssl.so sitting next
          # to it. This is the Linux analog of @loader_path on macOS.
          unversion() { echo "${1%.so.*}.so"; }

          # Skip system libs that ld.so resolves from the standard search paths.
          is_system_lib() {
            case "$1" in
              ld-linux*|libc.so.*|libm.so.*|libdl.so.*|libpthread.so.*|librt.so.*|\
              libgcc_s.so.*|libstdc++.so.*|libresolv.so.*|libnsl.so.*|libutil.so.*)
                return 0 ;;
              *) return 1 ;;
            esac
          }

          pending=("${{ matrix.lib }}")
          visited=""
          while [ "${#pending[@]}" -gt 0 ]; do
            current="${pending[0]}"
            pending=("${pending[@]:1}")
            case " $visited " in *" $current "*) continue ;; esac
            visited="$visited $current"

            # patchelf --print-needed lists each DT_NEEDED line; resolve via ldd
            # against the library itself to get absolute paths.
            while read -r line; do
              # ldd output lines look like "\tlibavcodec.so.61 => /usr/lib/.../libavcodec.so.61 (0x...)"
              soname=$(echo "$line" | awk '{print $1}')
              resolved=$(echo "$line" | awk '{print $3}')
              [ -n "$soname" ] || continue
              is_system_lib "$soname" && continue
              [ "${resolved:-}" = "" ] && continue
              [ "$resolved" = "not" ] && continue       # "not found"
              [ -f "$resolved" ] || continue

              base=$(unversion "$soname")
              if [ ! -f "$out/$base" ]; then
                cp "$resolved" "$out/$base"
                chmod u+w "$out/$base"
                patchelf --set-soname "$base" "$out/$base"
                pending+=("$base")
              fi
            done < <(ldd "$out/$current" 2>/dev/null | sed 's/^\s*//')
          done

          # Rewrite every bundled lib: DT_NEEDED uses unversioned soname + RPATH
          # ($ORIGIN) set via --force-rpath so transitive lookups work.
          echo "--- bundled ---"
          ls -1 "$out"
          for f in "$out"/*.so; do
            while read -r versioned; do
              base=$(unversion "$versioned")
              if [ "$versioned" != "$base" ] && [ -f "$out/$base" ]; then
                patchelf --replace-needed "$versioned" "$base" "$f"
              fi
            done < <(patchelf --print-needed "$f")
            patchelf --force-rpath --set-rpath '$ORIGIN' "$f"
          done

          echo "--- final deps ---"
          for f in "$out"/*.so; do
            echo "== $(basename "$f") =="
            patchelf --print-needed "$f" | sed 's/^/  /'
            echo "  rpath: $(patchelf --print-rpath "$f")"
          done

      # ── macOS ──
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libvorbis libogg ffmpeg dylibbundler

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="$BREW_PREFIX/lib/pkgconfig:$(brew --prefix ffmpeg)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cmake -S vgmstream -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_SKIP_INSTALL_RULES=ON \
            -DCMAKE_PREFIX_PATH="$BREW_PREFIX" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L$BREW_PREFIX/lib -L$(brew --prefix ffmpeg)/lib" \
            -DBUILD_CLI=OFF -DBUILD_V123=OFF -DBUILD_AUDACIOUS=OFF \
            -DUSE_MPEG=OFF -DUSE_G719=OFF -DUSE_G7221=OFF -DUSE_CELT=OFF \
            -DUSE_ATRAC9=OFF -DUSE_SPEEX=OFF
          cmake --build build --config Release --target libvgmstream_shared

      - name: Collect (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          out="runtimes/${{ matrix.rid }}/native"
          mkdir -p "$out"
          cp "build/src/${{ matrix.lib }}" "$out/"

          # dylibbundler walks the full transitive dep closure of libvgmstream,
          # copies every non-system dylib into $out, rewrites install names +
          # cross-refs to `@loader_path/<basename>`, and ad-hoc codesigns each
          # one. Handles the ffmpeg fanout (libx264/libx265/libvpx/libdav1d/
          # libopus/libmp3lame/libSvtAv1Enc/libssl/libcrypto/...) which hand-
          # rolled scripts have to enumerate and keep updated.
          dylibbundler \
            --fix-file "$out/${{ matrix.lib }}" \
            --bundle-deps \
            --dest-dir "$out" \
            --install-path "@loader_path/" \
            --overwrite-files

          # Sanity check: verify every @loader_path/* ref resolves to a bundled
          # file and every bundled dylib passes codesign. Consumers fail-fast
          # on missing refs (SIGKILL / Library not loaded) and bad signatures
          # (SIGKILL / Code Signature Invalid) — cheaper to catch in CI.
          cd "$out"
          fail=0
          for f in *.dylib; do
            while read -r dep; do
              case "$dep" in
                @loader_path/*)
                  name="${dep#@loader_path/}"
                  if [ ! -f "$name" ]; then
                    echo "::error::$f references $dep but $name is not in the bundle"
                    fail=1
                  fi ;;
                /opt/homebrew/*|/usr/local/*)
                  echo "::error::$f still carries absolute brew ref $dep"
                  fail=1 ;;
              esac
            done < <(otool -L "$f" | tail -n +2 | awk '{print $1}')
          done
          codesign --verify --verbose=2 *.dylib
          [ "$fail" = 0 ] || exit 1

          echo "--- final deps ---"
          for f in *.dylib; do
            echo "== $f =="
            otool -L "$f" | tail -n +2 | awk '{print "  " $1}'
          done

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}/native/

  package:
    name: Package
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts

      - name: Arrange runtimes
        run: |
          for dir in artifacts/native-*; do
            rid="${dir#artifacts/native-}"
            mkdir -p "VgmStream.NET/runtimes/$rid/native"
            cp "$dir"/* "VgmStream.NET/runtimes/$rid/native/"
          done

      - run: dotnet build VgmStream.NET.sln -c Release
      - run: dotnet test VgmStream.NET.sln -c Release --no-build --filter "FullyQualifiedName!~NativeTests"
      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="0.0.0-dev"
          fi
          dotnet pack VgmStream.NET/VgmStream.NET.csproj -c Release --no-build -p:Version="$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: |
            VgmStream.NET/bin/Release/*.nupkg
            VgmStream.NET/bin/Release/*.snupkg

  publish:
    name: Publish
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: nuget

      - name: Push to GitHub Packages
        run: dotnet nuget push "nuget/*.nupkg" --source "https://nuget.pkg.github.com/PSYLOCKE-GG/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
